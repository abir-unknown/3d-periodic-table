<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Periodic Table</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #05050a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #container {
            width: 100%;
            height: 100%;
        }
        #menu {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        button {
            background: rgba(0, 255, 200, 0.1);
            color: #00ffc8;
            border: 1px solid #00ffc8;
            padding: 10px 20px;
            margin: 0 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        button:hover, button.active {
            background: #00ffc8;
            color: #05050a;
            box-shadow: 0 0 15px #00ffc8;
        }
        /* Element Styling */
        .element {
            width: 120px;
            height: 160px;
            box-shadow: 0px 0px 12px rgba(0,255,200,0.5);
            border: 1px solid rgba(0,255,200,0.25);
            text-align: center;
            cursor: pointer;
            background-color: rgba(5, 15, 25, 0.8);
            transition: all 0.2s ease;
        }
        .element:hover {
            box-shadow: 0px 0px 20px rgba(0,255,255,0.75);
            border: 1px solid rgba(0,255,255,0.75);
            background-color: rgba(5, 25, 40, 0.9);
        }
        .element .number {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(0,255,200,0.7);
        }
        .element .symbol {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            font-size: 40px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .element .name {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255,255,255,0.75);
        }
        .element .weight {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            font-size: 10px;
            color: rgba(0,255,200,0.5);
        }
        /* Info Overlay Modal */
        #details-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 20, 30, 0.95);
            border: 2px solid #00ffc8;
            padding: 30px;
            width: 350px;
            z-index: 100;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,255,200,0.4);
        }
        #details-modal h2 { margin-top: 0; color: #00ffc8; font-size: 28px;}
        #details-modal p { margin: 10px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        #details-modal span { float: right; color: #00ffc8; font-weight: bold;}
        #close-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 15px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <div id="menu">
        <button id="table" class="active">Table</button>
        <button id="sphere">Globe</button>
        <button id="helix">Helix</button>
    </div>

    <div id="details-modal">
        <h2 id="m-symbol">H</h2>
        <p>Element Name: <span id="m-name">Hydrogen</span></p>
        <p>Atomic Number: <span id="m-number">1</span></p>
        <p>Atomic Weight: <span id="m-weight">1.008</span></p>
        <p>Configuration: <span id="m-config">1s1</span></p>
        <button id="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>

            ["Ag", "Silver", "107.87", 11, 5, "[Kr] 4d10 5s1"], ["Cd", "Cadmium", "112.41", 12, 5, "[Kr] 4d10 5s2"],
            ["In", "Indium", "114.82", 13, 5, "[Kr] 4d10 5s2 5p1"], ["Sn", "Tin", "118.71", 14, 5, "[Kr] 4d10 5s2 5p2"],
            ["Sb", "Antimony", "121.76", 15, 5, "[Kr] 4d10 5s2 5p3"], ["Te", "Tellurium", "127.60", 16, 5, "[Kr] 4d10 5s2 5p4"],
            ["I", "Iodine", "126.90", 17, 5, "[Kr] 4d10 5s2 5p5"], ["Xe", "Xenon", "131.29", 18, 5, "[Kr] 4d10 5s2 5p6"],
            ["Cs", "Cesium", "132.91", 1, 6, "[Xe] 6s1"], ["Ba", "Barium", "137.33", 2, 6, "[Xe] 6s2"],
            ["La", "Lanthanum", "138.91", 3, 9, "[Xe] 5d1 6s2"], ["Ce", "Cerium", "140.12", 4, 9, "[Xe] 4f1 5d1 6s2"],
            ["Pr", "Praseodymium", "140.91", 5, 9, "[Xe] 4f3 6s2"], ["Nd", "Neodymium", "144.24", 6, 9, "[Xe] 4f4 6s2"],
            ["Pm", "Promethium", "(145)", 7, 9, "[Xe] 4f5 6s2"], ["Sm", "Samarium", "150.36", 8, 9, "[Xe] 4f6 6s2"],
            ["Eu", "Europium", "151.96", 9, 9, "[Xe] 4f7 6s2"], ["Gd", "Gadolinium", "157.25", 10, 9, "[Xe] 4f7 5d1 6s2"],
            ["Tb", "Terbium", "158.93", 11, 9, "[Xe] 4f9 6s2"], ["Dy", "Dysprosium", "162.50", 12, 9, "[Xe] 4f10 6s2"],
            ["Ho", "Holmium", "164.93", 13, 9, "[Xe] 4f11 6s2"], ["Er", "Erbium", "167.26", 14, 9, "[Xe] 4f12 6s2"],

            ["Lu", "Lutetium", "174.97", 17, 9, "[Xe] 4f14 5d1 6s2"], ["Hf", "Hafnium", "178.49", 4, 6, "[Xe] 4f14 5d2 6s2"],

            ["Re", "Rhenium", "186.21", 7, 6, "[Xe] 4f14 5d5 6s2"], ["Os", "Osmium", "190.23", 8, 6, "[Xe] 4f14 5d6 6s2"],
            ["Ir", "Iridium", "192.22", 9, 6, "[Xe] 4f14 5d7 6s2"], ["Pt", "Platinum", "195.08", 10, 6, "[Xe] 4f14 5d9 6s1"],
            ["Au", "Gold", "196.97", 11, 6, "[Xe] 4f14 5d10 6s1"], ["Hg", "Mercury", "200.59", 12, 6, "[Xe] 4f14 5d10 6s2"],
            ["Tl", "Thallium", "204.38", 13, 6, "[Xe] 4f14 5d10 6s2 6p1"], ["Pb", "Lead", "207.2", 14, 6, "[Xe] 4f14 5d10 6s2 6p2"],
            ["Bi", "Bismuth", "208.98", 15, 6, "[Xe] 4f14 5d10 6s2 6p3"], ["Po", "Polonium", "(209)", 16, 6, "[Xe] 4f14 5d10 6s2 6p4"],
            ["At", "Astatine", "(210)", 17, 6, "[Xe] 4f14 5d10 6s2 6p5"], ["Rn", "Radon", "(222)", 18, 6, "[Xe] 4f14 5d10 6s2 6p6"],
            ["Fr", "Francium", "(223)", 1, 7, "[Rn] 7s1"], ["Ra", "Radium", "(226)", 2, 7, "[Rn] 7s2"],
            ["Ac", "Actinium", "(227)", 3, 10, "[Rn] 6d1 7s2"], ["Th", "Thorium", "232.04", 4, 10, "[Rn] 6d2 7s2"],
            ["Pa", "Protactinium", "231.04", 5, 10, "[Rn] 5f2 6d1 7s2"], ["U", "Uranium", "238.03", 6, 10, "[Rn] 5f3 6d1 7s2"],
            ["Np", "Neptunium", "(237)", 7, 10, "[Rn] 5f4 6d1 7s2"], ["Pu", "Plutonium", "(244)", 8, 10, "[Rn] 5f6 7s2"],
            ["Am", "Americium", "(243)", 9, 10, "[Rn] 5f7 7s2"], ["Cm", "Curium", "(247)", 10, 10, "[Rn] 5f7 6d1 7s2"],
            ["Bk", "Berkelium", "(247)", 11, 10, "[Rn] 5f9 7s2"], ["Cf", "Californium", "(251)", 12, 10, "[Rn] 5f10 7s2"],
            ["Es", "Einsteinium", "(252)", 13, 10, "[Rn] 5f11 7s2"], ["Fm", "Fermium", "(257)", 14, 10, "[Rn] 5f12 7s2"],
            ["Md", "Mendelevium", "(258)", 15, 10, "[Rn] 5f13 7s2"], ["No", "Nobelium", "(259)", 16, 10, "[Rn] 5f14 7s2"],
            ["Lr", "Lawrencium", "(262)", 17, 10, "[Rn] 5f14 7s2 7p1"], ["Rf", "Rutherfordium", "(267)", 4, 7, "[Rn] 5f14 6d2 7s2"],
            ["Db", "Dubnium", "(268)", 5, 7, "[Rn] 5f14 6d3 7s2"], ["Sg", "Seaborgium", "(269)", 6, 7, "[Rn] 5f14 6d4 7s2"],
            ["Bh", "Bohmium", "(270)", 7, 7, "[Rn] 5f14 6d5 7s2"], ["Hs", "Hassium", "(269)", 8, 7, "[Rn] 5f14 6d6 7s2"],
            ["Mt", "Meitnerium", "(278)", 9, 7, "[Rn] 5f14 6d7 7s2"], ["Ds", "Darmstadtium", "(281)", 10, 7, "[Rn] 5f14 6d8 7s2"],
            ["Rg", "Roentgenium", "(282)", 11, 7, "[Rn] 5f14 6d9 7s2"], ["Cn", "Copernicium", "(285)", 12, 7, "[Rn] 5f14 6d10 7s2"],
            ["Nh", "Nihonium", "(286)", 13, 7, "[Rn] 5f14 6d10 7s2 7p1"], ["Fl", "Flerovium", "(289)", 14, 7, "[Rn] 5f14 6d10 7s2 7p2"],
            ["Mc", "Moscovium", "(289)", 15, 7, "[Rn] 5f14 6d10 7s2 7p3"], ["Lv", "Livermorium", "(293)", 16, 7, "[Rn] 5f14 6d10 7s2 7p4"],
            ["Ts", "Tennessine", "(294)", 17, 7, "[Rn] 5f14 6d10 7s2 7p5"], ["Og", "Oganesson", "(294)", 18, 7, "[Rn] 5f14 6d10 7s2 7p6"]
        ];

        let camera, scene, renderer, controls;
        const objects = [];
        const targets = { table: [], sphere: [], helix: [] };

        init();
        animate();

        function init() {
            // Camera Setup
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 3000;

            scene = new THREE.Scene();

            // Populate Elements into the Scene
            for (let i = 0; i < tableData.length; i++) {
                const item = tableData[i];

                const element = document.createElement('div');
                element.className = 'element';
                
                // Add click handler to inspect detailed data
                element.addEventListener('click', () => showDetails(item, i + 1));

                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = i + 1;
                element.appendChild(number);

                const symbol = document.createElement('div');
                symbol.className = 'symbol';
                symbol.textContent = item[0];
                element.appendChild(symbol);

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = item[1];
                element.appendChild(name);

                const weight = document.createElement('div');
                weight.className = 'weight';
                weight.textContent = item[2];
                element.appendChild(weight);

                const objectCSS = new THREE.CSS3DObject(element);
                // Instantiate in random scatter arrangement initially
                objectCSS.position.x = Math.random() * 4000 - 2000;
                objectCSS.position.y = Math.random() * 4000 - 2000;
                objectCSS.position.z = Math.random() * 4000 - 2000;
                scene.add(objectCSS);

                objects.push(objectCSS);

                // --- 1. Target Layout Design: FLAT PERIODIC TABLE ---
                const objectTable = new THREE.Object3D();
                objectTable.position.x = (item[3] * 140) - 1330;
                objectTable.position.y = - (item[4] * 180) + 990;
                targets.table.push(objectTable);
            }

            // --- 2. Target Layout Design: 3D GLOBE / SPHERE ---
            const vector = new THREE.Vector3();
            for (let i = 0, l = objects.length; i < l; i++) {
                const phi = Math.acos(- 1 + (2 * i) / l);
                const theta = Math.sqrt(l * Math.PI) * phi;

                const objectSphere = new THREE.Object3D();
                objectSphere.position.setFromSphericalCoords(800, phi, theta);
                vector.copy(objectSphere.position).multiplyScalar(2);
                objectSphere.lookAt(vector);
                targets.sphere.push(objectSphere);
            }

            // --- 3. Target Layout Design: 3D HELIX / SPIRAL ---
            for (let i = 0, l = objects.length; i < l; i++) {
                const theta = i * 0.175 + Math.PI;
                const y = - (i * 8) + 450;

                const objectHelix = new THREE.Object3D();
                objectHelix.position.setFromCylindricalCoords(900, theta, y);
                vector.x = objectHelix.position.x * 2;
                vector.y = objectHelix.position.y;
                vector.z = objectHelix.position.z * 2;
                objectHelix.lookAt(vector);
                targets.helix.push(objectHelix);
            }

            // CSS3D Engine Rendering Init
            renderer = new THREE.CSS3DRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Interaction Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 500;
            controls.maxDistance = 6000;

            // Trigger mapping to GUI options
            setupButton('table');
            setupButton('sphere');
            setupButton('helix');

            // Start inside Default Table View
            transform(targets.table, 2000);

            window.addEventListener('resize', onWindowResize);
        }

        // Tween Layout morph logic
        function transform(target, duration) {
            TWEEN.removeAll();
            for (let i = 0; i < objects.length; i++) {
                const object = objects[i];
                const targetObject = target[i];

                new TWEEN.Tween(object.position)
                    .to({ x: targetObject.position.x, y: targetObject.position.y, z: targetObject.position.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();

                new TWEEN.Tween(object.rotation)
                    .to({ x: targetObject.rotation.x, y: targetObject.rotation.y, z: targetObject.rotation.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();
            }

            new TWEEN.Tween(this)
                .to({}, duration * 2)
                .onUpdate(render)
                .start();
        }

        function setupButton(id) {
            const button = document.getElementById(id);
            button.addEventListener('click', function () {
                document.querySelectorAll('#menu button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                transform(targets[id], 2000);
            });
        }

        function showDetails(data, atomicNum) {
            document.getElementById('m-symbol').innerText = data[0];
            document.getElementById('m-name').innerText = data[1];
            document.getElementById('m-number').innerText = atomicNum;
            document.getElementById('m-weight').innerText = data[2];
            document.getElementById('m-config').innerText = data[5];
            document.getElementById('details-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('details-modal').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            render();
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
